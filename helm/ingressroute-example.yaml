# Example IngressRoute using the gateway middleware.
# Apply per-service routes that reference the fc-gateway middleware.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: api-routes
  namespace: default
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: PathPrefix(`/api/conversion`)
      kind: Rule
      middlewares:
        - name: fc-gateway
          namespace: traefik
      services:
        - name: conversion-service
          port: 80

    - match: PathPrefix(`/api/identity`)
      kind: Rule
      middlewares:
        - name: fc-gateway
          namespace: traefik
      services:
        - name: identity-service
          port: 80

    - match: PathPrefix(`/api/usage`)
      kind: Rule
      middlewares:
        - name: fc-gateway
          namespace: traefik
      services:
        - name: usage-service
          port: 80

    - match: PathPrefix(`/api/jobs`)
      kind: Rule
      middlewares:
        - name: fc-gateway
          namespace: traefik
      services:
        - name: job-service
          port: 80
