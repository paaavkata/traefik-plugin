# Traefik Middleware CRD for the gateway plugin.
# Apply this in the same namespace as Traefik or reference cross-namespace.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-gateway-plugin
  namespace: fc-dev
spec:
  plugin:
    gateway:
      jwtSecret: "22LWtG2qr9I0EtNtrb8fzEWmlqRTiw1k7X82A1H6BJc="
      jwtIssuer: "file-convert.online"
      jwtHeaderKey: "Authorization"
      sessionIdHeader: "X-Session-Id"
      redisUrl: "redis://redis-master.fc-infra-dev:6379/0"
      redisPassword: ""
      redisDb: 0
      redisPrefix: "gw:rl:"
      serviceServiceUrl: "http://service-service.fc-dev"
      snapshotRefreshInterval: "30s"
      snapshotVersionPollInterval: "5s"
      identityServiceUrl: "http://identity-service.fc-dev"
      usageServiceUrl: "http://usage-service.fc-dev"
      defaultRateLimitRequests: 30
      defaultRateLimitDurationSeconds: 60
      defaultPlanName: "free"
      adminAccessLevel: "admin"
      freeAccessLevel: "free"
      userIdHeader: "X-User-Id"
      userPlanHeader: "X-User-Plan"
      isAdminHeader: "X-Is-Admin"
      httpTimeout: "5s"
      disableRateLimit: false
      disableAuth: false
      logLevel: "debug"
