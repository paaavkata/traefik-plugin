# Traefik Helm chart values overlay for the gateway plugin.
# Merge with your existing traefik values file.
#
# The plugin is loaded as a local plugin via volume mount in the Traefik pod.
# Alternatively, configure as a Go module plugin from a registry.

additionalArguments:
  - "--experimental.localplugins.gateway.modulename=github.com/fileconvert/traefik-gateway-plugin"

additionalVolumeMounts:
  - name: plugin-source
    mountPath: /plugins-local/src/github.com/fileconvert/traefik-gateway-plugin

additionalVolumes:
  - name: plugin-source
    configMap:
      name: traefik-gateway-plugin-source

# Middleware definition for the plugin (applied via IngressRoute or Middleware CRD)
# See middleware.yaml for the Traefik Middleware custom resource.
